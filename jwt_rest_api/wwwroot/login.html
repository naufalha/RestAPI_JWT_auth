<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekatva Admin - Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS v4 Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        /* Subtle animated background blobs */
        .blob-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: rgba(168, 85, 247, 0.4);
            filter: blur(100px);
            border-radius: 50%;
            animation: float 10s ease-in-out infinite;
        }

        .blob-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(56, 189, 248, 0.4);
            filter: blur(100px);
            border-radius: 50%;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Glassmorphism card */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.2);
            border-color: #9333ea;
        }
    </style>
</head>

<body class="flex min-h-screen items-center justify-center overflow-hidden relative">

    <!-- Decorative Blobs -->
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <!-- Login Container -->
    <div class="w-full max-w-md p-8 glass-card rounded-3xl relative z-10 m-4">
        
        <!-- Logo / Brand -->
        <div class="text-center mb-10">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-purple-600 to-blue-500 flex items-center justify-center text-white font-bold text-3xl mx-auto mb-4 shadow-lg shadow-purple-500/30">
                A
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Admin<span class="text-purple-600">Dashboard</span></h1>
            <p class="text-slate-500 mt-2 text-sm font-medium">Welcome back! Please login to your account.</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Email -->
            <div class="space-y-2">
                <label for="email" class="text-sm font-semibold text-slate-700 ml-1">Email Address</label>
                <div class="relative input-field border border-slate-300 rounded-xl bg-white overflow-hidden flex items-center">
                    <div class="pl-4 text-slate-400">
                        <i class="ph ph-envelope-simple text-xl"></i>
                    </div>
                    <input type="email" id="email" required placeholder="admin@ekatva.com" class="w-full py-3 px-3 outline-none text-slate-700 bg-transparent placeholder:text-slate-400">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                    <a href="#" class="text-xs font-semibold text-purple-600 hover:text-purple-700 transition-colors">Forgot Password?</a>
                </div>
                <div class="relative input-field border border-slate-300 rounded-xl bg-white overflow-hidden flex items-center">
                    <div class="pl-4 text-slate-400">
                        <i class="ph ph-lock-key text-xl"></i>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full py-3 px-3 outline-none text-slate-700 bg-transparent placeholder:text-slate-400">
                    <button type="button" id="togglePassword" class="pr-4 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
                        <i class="ph ph-eye text-xl" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Error Message Container -->
            <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm py-2 px-3 rounded-lg border border-red-100 flex items-center gap-2">
                <i class="ph ph-warning-circle text-lg shrink-0"></i>
                <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-bold rounded-xl shadow-lg shadow-purple-500/25 transition-all hover:shadow-purple-500/40 hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2 group">
                <span>Sign In</span>
                <i class="ph ph-arrow-right font-bold transition-transform group-hover:translate-x-1"></i>
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">or</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>

            <!-- Google Auth Button -->
            <button type="button" class="w-full py-3.5 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold rounded-xl shadow-sm transition-all hover:shadow-md hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Continue with Google</span>
            </button>
        </form>
    </div>

    <script src="login.js"></script>
</body>

</html>
